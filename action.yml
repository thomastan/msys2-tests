name: 'Run msys2-tests'
description: 'Runs msys2-tests'
runs:
  using: 'composite'
  steps:
    - name: 'Show mount table'
      shell: msys2 {0}
      run: | 
        echo "Fstab: "
        cat /etc/fstab
        mount
        echo TMP was $TMP
        myTMPDIR="${{ runner.temp }}"
        if [[ "$myTMPDIR" =~ ([a-zA-Z]):(.*) ]]; then
          export myTMPDIR="/${BASH_REMATCH[1],,}${BASH_REMATCH[2]//\\//}"
          echo "myTMPDIR is now $myTMPDIR"
        else
          echo "Setting TMPDIR to $TMPDIR"
        fi
        mkdir -p /tmp
        mkdir -p $myTMPDIR
        echo "Two mkdir's done"
        umount /tmp || echo "Unmount /tmp failed, continuing"
        mount -o bind $myTMPDIR /tmp || echo "Mount /tmp failed, continuing"
        if [[ -d /tmp ]]; then echo "/tmp exists"; ls /tmp; else echo "/tmp does not exist"; fi
        if [[ -d /usr ]]; then echo "/usr exists"; ls /usr; else echo "/usr does not exist"; fi
        echo "Revised mount"
        mount

    - shell: msys2 {0}
      run: |
        . '${{ github.action_path }}/group_helper.sh' "test: toolchain"
        make -C '${{ github.action_path }}' -j toolchain

